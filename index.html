<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philosophia — 哲学者診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0f0e0b;
    --bg2: #1a1814;
    --bg3: #232018;
    --border: rgba(212,190,140,0.15);
    --border2: rgba(212,190,140,0.3);
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --text: #f0e8d6;
    --text2: #a89878;
    --text3: #6e5e48;
    --purple: #7c6fcd;
    --purple2: #a99de0;
    --red: #c46a4a;
    --radius: 12px;
    --radius-sm: 7px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 3.5rem 1rem 2rem;
    border-bottom: 0.5px solid var(--border);
    position: relative;
  }
  .header-ornament {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0.8;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 6vw, 52px);
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--gold2);
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }
  .header-sub {
    font-size: 16px;
    color: var(--text2);
    font-style: italic;
    margin-bottom: 1.5rem;
  }

  /* PROGRESS */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 400px;
    margin: 0 auto;
  }
  .progress-track {
    flex: 1;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text3);
    white-space: nowrap;
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* INTRO */
  .intro-section {
    padding: 4rem 0 3rem;
    text-align: center;
  }
  .intro-icon {
    font-size: 64px;
    display: block;
    margin-bottom: 1.5rem;
    filter: drop-shadow(0 0 30px rgba(201,168,76,0.3));
  }
  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 1rem;
    line-height: 1.3;
  }
  .intro-body {
    font-size: 17px;
    color: var(--text2);
    max-width: 500px;
    margin: 0 auto 2.5rem;
    line-height: 1.8;
  }
  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 2.5rem;
  }
  .tag {
    font-size: 12px;
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 4px 14px;
    color: var(--text2);
    letter-spacing: 0.05em;
  }

  /* BUTTONS */
  .btn {
    display: inline-block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: var(--radius-sm);
  }
  .btn-gold {
    background: var(--gold);
    color: #1a1500;
    border: none;
    padding: 13px 36px;
  }
  .btn-gold:hover { background: var(--gold2); transform: translateY(-1px); }
  .btn-gold:active { transform: scale(0.98); }
  .btn-outline {
    background: transparent;
    color: var(--text2);
    border: 0.5px solid var(--border2);
    padding: 12px 28px;
    font-size: 16px;
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  /* QUESTION */
  .question-section { padding: 3rem 0 2rem; }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .q-num {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .q-line {
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }
  .q-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(20px, 3.5vw, 26px);
    font-weight: 500;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .q-note {
    font-size: 14px;
    font-style: italic;
    color: var(--text3);
    margin-bottom: 2rem;
    min-height: 1.4em;
  }
  .choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2rem; }
  .choice {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    color: var(--text2);
    line-height: 1.5;
  }
  .choice:hover { border-color: var(--gold); color: var(--text); }
  .choice.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
    color: var(--text);
  }
  .choice-letter {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text3);
    background: var(--bg3);
    border-radius: 4px;
    padding: 3px 7px;
    flex-shrink: 0;
    margin-top: 2px;
    font-family: 'Crimson Pro', serif;
  }
  .choice.selected .choice-letter { background: rgba(201,168,76,0.2); color: var(--gold); }

  /* LOADING */
  .loading-section {
    padding: 5rem 0;
    text-align: center;
  }
  .loader {
    width: 48px;
    height: 48px;
    border: 1.5px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 1.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--text2);
    font-style: italic;
  }

  /* RESULT */
  .result-section { padding: 2.5rem 0 4rem; }
  .result-header {
    text-align: center;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 0.5px solid var(--border);
  }
  .result-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }
  .tendency-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 0.8rem;
  }
  .tendency-desc {
    font-size: 16px;
    color: var(--text2);
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.8;
  }

  /* ANSWER REVIEW */
  .answer-review { display: flex; flex-direction: column; gap: 8px; }
  .answer-row { display: grid; grid-template-columns: 5em 1fr; gap: 10px; align-items: baseline; font-size: 15px; line-height: 1.5; }
  .answer-axis { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); padding-top: 2px; }
  .answer-val { color: var(--text2); }
  .keyword-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 1.2rem 0 0; }
  .keyword { font-size: 13px; border: 0.5px solid rgba(201,168,76,0.35); border-radius: 20px; padding: 4px 14px; color: var(--gold); background: rgba(201,168,76,0.07); letter-spacing: 0.04em; }

  /* SECTION */
  .section { margin-bottom: 2.5rem; }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }

  /* PHILOSOPHER CARDS */
  .phil-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .phil-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
  }
  .phil-card.aligned::before { background: var(--gold); }
  .phil-card.opposed::before { background: var(--red); }
  .phil-badge {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 20px;
    padding: 3px 10px;
    display: inline-block;
    margin-bottom: 10px;
  }
  .phil-badge.aligned { background: rgba(201,168,76,0.12); color: var(--gold); border: 0.5px solid rgba(201,168,76,0.3); }
  .phil-badge.opposed { background: rgba(196,106,74,0.12); color: var(--red); border: 0.5px solid rgba(196,106,74,0.3); }
  .phil-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .phil-era {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }
  .phil-reason { font-size: 15px; color: var(--text2); line-height: 1.7; }
  .phil-links {
    margin-top: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .phil-link {
    font-size: 12px;
    color: var(--purple2);
    border: 0.5px solid rgba(124,111,205,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .phil-link:hover { color: var(--gold2); border-color: var(--gold); }
  .phil-link::after { content: '↗'; font-size: 10px; }

  /* RESEARCH */
  .research-list { list-style: none; }
  .research-item {
    border-bottom: 0.5px solid var(--border);
    padding: 14px 0 14px 20px;
    position: relative;
    font-size: 15px;
    color: var(--text2);
    line-height: 1.6;
  }
  .research-item::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--gold);
    font-size: 13px;
  }
  .research-item:last-child { border-bottom: none; }
  .research-link {
    color: var(--purple2);
    text-decoration: none;
    border-bottom: 0.5px solid rgba(124,111,205,0.3);
    transition: color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .research-link:hover { color: var(--gold2); }
  .research-link::after { content: '↗'; font-size: 10px; }

  /* QUOTE */
  .quote-block {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    position: relative;
  }
  .quote-mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px;
    line-height: 1;
    color: var(--gold);
    opacity: 0.2;
    position: absolute;
    top: 0.5rem;
    left: 1.2rem;
  }
  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 3vw, 24px);
    font-style: italic;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 1rem;
    padding-top: 0.5rem;
  }
  .quote-attr { font-size: 13px; color: var(--gold); letter-spacing: 0.08em; }
  .quote-context {
    margin-top: 10px;
    font-size: 14px;
    color: var(--text3);
    font-style: italic;
  }

  /* SHARE */
  .share-section {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    text-align: center;
    margin-bottom: 2rem;
  }
  .share-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .share-body { font-size: 14px; color: var(--text2); margin-bottom: 1.2rem; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2rem 1rem 3rem;
    border-top: 0.5px solid var(--border);
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  /* DIVIDER */
  .ornament-divider {
    text-align: center;
    color: var(--gold);
    opacity: 0.4;
    font-size: 16px;
    letter-spacing: 0.5em;
    margin: 2rem 0;
  }

  @media (max-width: 600px) {
    .wrap { padding: 0 1rem; }
    .phil-card { padding: 1.2rem; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="header-ornament">◈ Philosophia ◈</div>
    <h1>哲学者診断</h1>
    <p class="header-sub">あなたの思想に最も近い哲学者を探す旅</p>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progressLabel">0 / 5</span>
    </div>
  </header>

  <!-- INTRO -->
  <div class="screen active" id="screen-intro">
    <div class="intro-section">
      <span class="intro-icon">🦉</span>
      <h2 class="intro-title">あなたの哲学的傾向を<br>発見しましょう</h2>
      <p class="intro-body">
        知識・倫理・自由・社会・自己——5つのテーマについて直感で答えるだけで、あなたの思想に共鳴する哲学者と対立する哲学者を紹介します。さらに学びを深めるための参考リンクも提供します。
      </p>
      <div class="tag-list">
        <span class="tag">認識論</span>
        <span class="tag">倫理学</span>
        <span class="tag">自由論</span>
        <span class="tag">政治哲学</span>
        <span class="tag">自己論</span>
      </div>
      <button class="btn btn-gold" onclick="startQuiz()">診断をはじめる</button>
    </div>
  </div>

  <!-- QUESTION -->
  <div class="screen" id="screen-question">
    <div class="question-section">
      <div class="q-meta">
        <span class="q-num" id="qNum">問い 1 / 5</span>
        <div class="q-line"></div>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="q-note" id="qNote"></div>
      <div class="choices" id="choicesContainer"></div>
      <div class="btn-row">
        <button class="btn btn-gold" id="nextBtn" onclick="nextQuestion()" disabled>次へ</button>
        <button class="btn btn-outline" id="prevBtn" onclick="prevQuestion()" style="display:none">戻る</button>
      </div>
    </div>
  </div>

  <!-- LOADING -->
  <div class="screen" id="screen-loading">
    <div class="loading-section">
      <div class="loader"></div>
      <div class="loading-text">思想の地図を描いています...</div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-section" id="resultContent"></div>
  </div>

  <footer>
    Philosophia — 哲学独学促進アプリ &nbsp;·&nbsp; 早稲田大学哲学科へ贈る
  </footer>
</div>

// Philosopher database
const PHILOSOPHERS = [
  {
    id: "hegel",
    name: "ヘーゲル",
    fullname: "G.W.F. ヘーゲル",

let currentQ = 0;
let answers = [];
let selectedIndex = null;

function setScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}
function updateProgress() {
  const pct = (currentQ / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = currentQ + ' / ' + QUESTIONS.length;
}
function startQuiz() {
  currentQ = 0; answers = []; selectedIndex = null;
  renderQuestion();
  setScreen('question');
  updateProgress();
}
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  selectedIndex = answers[currentQ] !== undefined ? answers[currentQ] : null;
  document.getElementById('qNum').textContent = '問い ' + (currentQ+1) + ' / ' + QUESTIONS.length;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('qNote').textContent = q.note;
  const c = document.getElementById('choicesContainer');
  c.innerHTML = '';
  q.choices.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice' + (selectedIndex === i ? ' selected' : '');
    btn.innerHTML = '<span class="choice-letter">' + ch.label + '</span><span>' + ch.text + '</span>';
    btn.onclick = () => selectChoice(i);
    c.appendChild(btn);
  });
  document.getElementById('nextBtn').disabled = selectedIndex === null;
  document.getElementById('prevBtn').style.display = currentQ > 0 ? 'inline-block' : 'none';
  updateProgress();
}
function selectChoice(i) {
  selectedIndex = i;
  answers[currentQ] = i;
  document.querySelectorAll('.choice').forEach((b, idx) => b.classList.toggle('selected', idx === i));
  document.getElementById('nextBtn').disabled = false;
}
function nextQuestion() {
  if (selectedIndex === null) return;
  answers[currentQ] = selectedIndex;
  currentQ++;
  if (currentQ >= QUESTIONS.length) {
    showLoading();
    setTimeout(computeResult, 800);
  } else { renderQuestion(); }
}
function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}
function showLoading() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = '5 / 5';
  setScreen('loading');
}

function computeResult() {
  // Accumulate all scores
  const scores = {};
  QUESTIONS.forEach((q, qi) => {
    const ch = q.choices[answers[qi]];
    Object.entries(ch.scores).forEach(([k, v]) => {
      scores[k] = (scores[k] || 0) + v;
    });
  });

  // Find tendency
  let tendency = TENDENCIES[0];
  let bestMatch = -1;
  TENDENCIES.forEach(t => {
    let match = 0;
    Object.keys(t.keys).forEach(k => { if ((scores[k] || 0) >= 2) match++; });
    if (match > bestMatch) { bestMatch = match; tendency = t; }
  });

  // Score philosophers
  const philScores = PHILOSOPHERS.map(p => {
    let total = 0;
    Object.entries(p.tags).forEach(([k, v]) => {
      total += (scores[k] || 0) * v;
    });
    return { phil: p, score: total };
  }).sort((a, b) => b.score - a.score);

  const aligned = philScores[0].phil;
  const opposed = philScores[philScores.length - 1].phil;
  const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];

  renderResult(tendency, aligned, opposed, quote);
  setScreen('result');
}

function renderResult(tendency, aligned, opposed, quote) {
  const axisLabels = ["認識論","倫理学","自由論","政治哲学","自己論"];
  const answerRows = QUESTIONS.map((q, i) => {
    return '<div class="answer-row"><span class="answer-axis">' + axisLabels[i] + '</span><span class="answer-val">' + q.choices[answers[i]].text + '</span></div>';
  }).join('');

  const html = `
    <div class="result-header">
      <div class="result-title">◈ 診断結果 ◈</div>
      <div class="tendency-name">${tendency.name}</div>
      <div class="tendency-desc">${tendency.desc}</div>
      <div class="keyword-list">
        ${tendency.keywords.map(k => '<span class="keyword">' + k + '</span>').join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-label">あなたの回答</div>
      <div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.4rem 1.6rem;">
        <div class="answer-review">${answerRows}</div>
      </div>
    </div>

    <div class="ornament-divider">· · ·</div>

    <div class="section">
      <div class="section-label">共鳴する哲学者</div>
      <div class="phil-card aligned">
        <span class="phil-badge aligned">あなたに近い思想</span>
        <div class="phil-name">${aligned.fullname}</div>
        <div class="phil-era">${aligned.era}</div>
        <div class="phil-reason">${aligned.reason_aligned}</div>
        <div class="phil-links">
          ${aligned.links.map(l => '<a class="phil-link" href="' + l.url + '" target="_blank" rel="noopener">' + l.label + '</a>').join('')}
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">対立する哲学者</div>
      <div class="phil-card opposed">
        <span class="phil-badge opposed">対極にある思想</span>
        <div class="phil-name">${opposed.fullname}</div>
        <div class="phil-era">${opposed.era}</div>
        <div class="phil-reason">${opposed.reason_opposed}</div>
        <div class="phil-links">
          ${opposed.links.map(l => '<a class="phil-link" href="' + l.url + '" target="_blank" rel="noopener">' + l.label + '</a>').join('')}
        </div>
      </div>
    </div>

    <div class="ornament-divider">· · ·</div>

    <div class="section">
      <div class="section-label">さらに深く学ぶために</div>
      <ul class="research-list">
        ${[...aligned.books, ...opposed.books.slice(0,1)].map(b =>
          '<li class="research-item"><strong style="color:var(--text)">' + b.title + '</strong> — ' + b.note + ' <a class="research-link" href="' + b.url + '" target="_blank" rel="noopener">参考リンク</a></li>'
        ).join('')}
        <li class="research-item">
          <strong style="color:var(--text)">Stanford Encyclopedia of Philosophy</strong> — 世界最高水準の哲学事典。英語だが無料でオープンアクセス。
          <a class="research-link" href="https://plato.stanford.edu/" target="_blank" rel="noopener">Stanford Encyclopedia</a>
        </li>
        <li class="research-item">
          <strong style="color:var(--text)">青空文庫</strong> — パブリックドメインの哲学書を日本語で無料閲覧できる。
          <a class="research-link" href="https://www.aozora.gr.jp/" target="_blank" rel="noopener">青空文庫</a>
        </li>
      </ul>
    </div>

    <div class="ornament-divider">· · ·</div>

    <div class="section">
      <div class="section-label">今日の哲学者からのことば</div>
      <div class="quote-block">
        <div class="quote-mark">"</div>
        <div class="quote-text">「${quote.text}」</div>
        <div class="quote-attr">― ${quote.author}</div>
        <div class="quote-context">${quote.context}</div>
      </div>
    </div>

    <div class="share-section">
      <div class="share-title">友人とシェアしよう</div>
      <div class="share-body">同じ学科の仲間に診断を勧めて、互いの哲学的傾向を比べてみましょう。</div>
      <button class="btn btn-outline" onclick="copyUrl()">このページのURLをコピー</button>
      <div id="copyMsg" style="font-size:13px;color:var(--gold);margin-top:8px;height:1.4em;"></div>
    </div>

    <div class="btn-row" style="justify-content:center;margin-top:1rem">
      <button class="btn btn-gold" onclick="restart()">もう一度診断する</button>
    </div>
  `;
  document.getElementById('resultContent').innerHTML = html;
}

function copyUrl() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    document.getElementById('copyMsg').textContent = 'コピーしました！友人にシェアしてください。';
    setTimeout(() => document.getElementById('copyMsg').textContent = '', 3000);
  }).catch(() => {
    document.getElementById('copyMsg').textContent = 'URLをコピーできませんでした。手動でコピーしてください。';
  });
}

function restart() {
  currentQ = 0; answers = []; selectedIndex = null;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressLabel').textContent = '0 / 5';
  setScreen('intro');
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
